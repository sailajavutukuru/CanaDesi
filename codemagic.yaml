workflows:
  react-native-ios:
    name: React Native iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.svutukuru.canadesi
      vars:
        BUNDLE_ID: "com.svutukuru.canadesi"
      node: v18.17.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate iOS project
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/CanaDesi.xcodeproj/project.xcworkspace" \
            --scheme "CanaDesi" \
            --disable-xcpretty
    artifacts:
      - build/ios/ipa/*.ipa