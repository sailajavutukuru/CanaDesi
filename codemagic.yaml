workflows:
  react-native-ios:
    name: React Native iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.svutukuru.canadesi"
      node: v18.17.0
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>bundleID</key>
            <string>com.svutukuru.canadesi</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/CanaDesi.xcodeproj/project.xcworkspace" \
            --scheme "CanaDesi" \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa