workflows:
  react-native-ios:
    name: React Native iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.svutukuru.canadesi
      vars:
        BUNDLE_ID: "com.svutukuru.canadesi"
      node: v18.17.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate iOS project
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>X3T294BRK3</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/CanaDesi.xcodeproj/project.xcworkspace" \
            --scheme "CanaDesi" \
            --export-options-plist /Users/builder/export_options.plist \
            --disable-xcpretty
    artifacts:
      - build/ios/ipa/*.ipa